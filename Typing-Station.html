<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typist - Minimal Speed Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@400;500&amp;family=Fira+Code:wght@400;500&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
</head>
<body style="--bg: #0a0a0a; --text-muted: #737373; --text-normal: #d4d4d4; --text-active: #e5e5e5; --bg-panel: rgba(23, 23, 23, 0.5); --bg-active: #262626; --border: rgba(38, 38, 38, 0.5); --error: #ef4444; --error-underline: rgba(127, 29, 29, 0.5); --font-typing: 'JetBrains Mono', monospace;" class="bg-[var(--bg)] text-[var(--text-muted)] font-['Inter'] h-screen w-screen overflow-hidden flex flex-col items-center selection:bg-transparent transition-colors duration-500">

    <!-- Header -->
    <header class="w-full max-w-5xl p-8 flex justify-between items-center z-10">
        <div class="flex items-center gap-2 text-[var(--text-normal)] transition-colors duration-300">
            <iconify-icon icon="solar:keyboard-linear" stroke-width="1.5" class="text-xl"></iconify-icon>
            <h1 class="text-lg font-medium tracking-tighter">typist</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Settings -->
            <div class="flex items-center bg-[var(--bg-panel)] rounded-full px-3 py-1.5 gap-1 backdrop-blur-sm border border-[var(--border)] transition-colors duration-300">
                <iconify-icon icon="solar:clock-circle-linear" stroke-width="1.5" class="text-sm mr-2 text-[var(--text-muted)] transition-colors duration-300"></iconify-icon>
                <button class="time-opt px-2 py-0.5 text-xs rounded-full transition-colors hover:text-[var(--text-normal)]" data-time="15">15</button>
                <button class="time-opt px-2 py-0.5 text-xs rounded-full transition-colors text-[var(--text-active)] bg-[var(--bg-active)]" data-time="30">30</button>
                <button class="time-opt px-2 py-0.5 text-xs rounded-full transition-colors hover:text-[var(--text-normal)]" data-time="60">60</button>
            </div>

            <!-- Theme Toggle -->
            <button id="theme-toggle" class="flex items-center justify-center bg-[var(--bg-panel)] rounded-full w-8 h-8 backdrop-blur-sm border border-[var(--border)] transition-colors duration-300 text-[var(--text-muted)] hover:text-[var(--text-active)] focus:outline-none">
                <iconify-icon id="theme-icon" icon="solar:sun-linear" stroke-width="1.5" class="text-base"></iconify-icon>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-4xl px-8 flex flex-col justify-center relative">
        
        <!-- Active Typing Area -->
        <div id="typing-area" class="w-full relative transition-opacity duration-300 opacity-100 z-10">
            <!-- Timer & Live Stats -->
            <div class="flex justify-between items-end mb-4 font-[var(--font-typing)]">
                <div id="timer" class="text-2xl text-[var(--text-normal)] font-medium transition-colors duration-300">30</div>
                <div id="live-wpm" class="text-sm opacity-0 transition-opacity duration-300 text-[var(--text-normal)]">0 wpm</div>
            </div>

            <!-- Words Container -->
            <div id="words-wrapper" class="relative h-[120px] overflow-hidden text-2xl font-[var(--font-typing)] leading-loose transition-all duration-300" style="mask-image: linear-gradient(to bottom, black 50%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);">
                
                <!-- Caret -->
                <div id="caret" class="absolute w-[2px] h-7 bg-[var(--text-normal)] rounded-full transition-all duration-100 ease-out z-20" style="transform: translate(0px, 0px); opacity: 1;"></div>
                
                <!-- Inner scrollable words -->
                <div id="words-inner" class="flex flex-wrap content-start relative transition-transform duration-200 ease-out z-10 w-full select-none" style="transform: translateY(0px);">
                    <!-- Words injected via JS -->
                </div>
            </div>
            
            <!-- Mobile input capture -->
            <input type="text" id="mobile-input" class="absolute top-0 left-0 opacity-0 w-full h-full -z-10 cursor-default" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off">
        </div>

        <!-- Results Screen -->
        <div id="results-area" class="absolute inset-0 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-all duration-500 scale-95 z-20">
            <div class="grid grid-cols-2 gap-12 text-center mb-12">
                <div class="flex flex-col gap-2 text-[var(--text-normal)]">
                    <span class="text-sm font-medium tracking-tight">WPM</span>
                    <span id="res-wpm" class="text-6xl font-medium tracking-tighter text-[var(--text-active)]">0</span>
                </div>
                <div class="flex flex-col gap-2 text-[var(--text-normal)]">
                    <span class="text-sm font-medium tracking-tight">ACC</span>
                    <span id="res-acc" class="text-6xl font-medium tracking-tighter text-[var(--text-active)]">0%</span>
                </div>
            </div>
            <div class="flex gap-8 text-xs font-medium tracking-tight">
                <div class="flex flex-col items-center gap-1">
                    <span>KEYSTROKES</span>
                    <span id="res-keys" class="text-[var(--text-normal)]">0</span>
                </div>
                <div class="flex flex-col items-center gap-1">
                    <span>TIME</span>
                    <span id="res-time" class="text-[var(--text-normal)]">30s</span>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer Controls -->
    <footer class="w-full py-12 flex justify-center items-center flex-col gap-4 z-10">
        <button id="restart-btn" class="text-[var(--text-muted)] hover:text-[var(--text-active)] transition-colors duration-200 p-4 rounded-full hover:bg-[var(--bg-panel)] group focus:outline-none">
            <iconify-icon icon="solar:restart-linear" stroke-width="1.5" class="text-2xl group-hover:rotate-180 transition-transform duration-500 ease-out"></iconify-icon>
        </button>
        <div class="text-xs tracking-tight flex gap-4 text-[var(--text-muted)]">
            <span class="bg-[var(--bg-panel)] px-2 py-1 rounded transition-colors duration-300">tab</span> <span>+</span> <span class="bg-[var(--bg-panel)] px-2 py-1 rounded transition-colors duration-300">enter</span> <span>to restart</span>
        </div>
    </footer>

    <!-- Animated Font Toggle (Bottom Right) -->
    <div class="fixed bottom-8 right-8 flex flex-col items-end gap-2 z-50">
        <div id="font-menu" class="flex flex-col gap-1 opacity-0 pointer-events-none translate-y-4 transition-all duration-300 ease-out bg-[var(--bg-panel)] backdrop-blur-md p-1.5 rounded-2xl border border-[var(--border)]">
            <button class="font-opt px-3 py-1.5 text-xs rounded-xl transition-colors bg-[var(--bg-active)] text-[var(--text-active)] font-['JetBrains_Mono']" data-font="'JetBrains Mono', monospace">JetBrains</button>
            <button class="font-opt px-3 py-1.5 text-xs rounded-xl transition-colors hover:bg-[var(--bg-panel)] text-[var(--text-muted)] hover:text-[var(--text-active)] font-['Fira_Code']" data-font="'Fira Code', monospace">Fira Code</button>
            <button class="font-opt px-3 py-1.5 text-xs rounded-xl transition-colors hover:bg-[var(--bg-panel)] text-[var(--text-muted)] hover:text-[var(--text-active)] font-['Space_Mono']" data-font="'Space Mono', monospace">Space Mono</button>
        </div>
        <button id="font-toggle-btn" class="w-10 h-10 flex items-center justify-center bg-[var(--bg-panel)] backdrop-blur-md rounded-full border border-[var(--border)] text-[var(--text-muted)] hover:text-[var(--text-active)] transition-all duration-300 focus:outline-none group">
            <iconify-icon icon="solar:text-field-linear" stroke-width="1.5" class="text-xl group-hover:scale-110 transition-transform duration-300"></iconify-icon>
        </button>
    </div>

    <script>
        const wordsList = ["the", "be", "to", "of", "and", "a", "in", "that", "have", "I", "it", "for", "not", "on", "with", "he", "as", "you", "do", "at", "this", "but", "his", "by", "from", "they", "we", "say", "her", "she", "or", "an", "will", "my", "one", "all", "would", "there", "their", "what", "so", "up", "out", "if", "about", "who", "get", "which", "go", "me", "when", "make", "can", "like", "time", "no", "just", "him", "know", "take", "people", "into", "year", "your", "good", "some", "could", "them", "see", "other", "than", "then", "now", "look", "only", "come", "its", "over", "think", "also", "back", "after", "use", "two", "how", "our", "work", "first", "well", "way", "even", "new", "want", "because", "any", "these", "give", "day", "most", "us", "system", "program", "code", "design", "clean", "minimal", "modern", "speed", "test", "focus", "typing", "fast", "fluid", "state", "react", "build", "create", "innovate"];

        let state = {
            words: [], currentWordIdx: 0, currentLetterIdx: 0, timeLimit: 30, timeLeft: 30, timer: null,
            active: false, finished: false, correctKeystrokes: 0, incorrectKeystrokes: 0, totalKeystrokes: 0, lineHeight: 0
        };

        const DOM = {
            wordsInner: document.getElementById('words-inner'), caret: document.getElementById('caret'),
            timer: document.getElementById('timer'), liveWpm: document.getElementById('live-wpm'),
            typingArea: document.getElementById('typing-area'), resultsArea: document.getElementById('results-area'),
            restartBtn: document.getElementById('restart-btn'), timeOpts: document.querySelectorAll('.time-opt'),
            mobileInput: document.getElementById('mobile-input')
        };

        // Theme Setup
        let isDark = true;
        const themeIcon = document.getElementById('theme-icon');
        const themeToggle = document.getElementById('theme-toggle');

        const themes = {
            dark: {
                '--bg': '#0a0a0a', '--text-muted': '#737373', '--text-normal': '#d4d4d4', '--text-active': '#e5e5e5',
                '--bg-panel': 'rgba(23, 23, 23, 0.5)', '--bg-active': '#262626', '--border': 'rgba(38, 38, 38, 0.5)',
                '--error': '#ef4444', '--error-underline': 'rgba(127, 29, 29, 0.5)'
            },
            light: {
                '--bg': '#ffffff', '--text-muted': '#a3a3a3', '--text-normal': '#525252', '--text-active': '#171717',
                '--bg-panel': 'rgba(245, 245, 245, 0.8)', '--bg-active': '#e5e5e5', '--border': 'rgba(229, 229, 229, 0.5)',
                '--error': '#ef4444', '--error-underline': 'rgba(254, 202, 202, 0.8)'
            }
        };

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            const theme = isDark ? themes.dark : themes.light;
            for (let key in theme) document.body.style.setProperty(key, theme[key]);
            themeIcon.setAttribute('icon', isDark ? 'solar:sun-linear' : 'solar:moon-linear');
        });

        // Font Toggle Setup
        const fontToggleBtn = document.getElementById('font-toggle-btn');
        const fontMenu = document.getElementById('font-menu');
        const fontOpts = document.querySelectorAll('.font-opt');
        let fontMenuOpen = false;

        fontToggleBtn.addEventListener('click', () => {
            fontMenuOpen = !fontMenuOpen;
            if (fontMenuOpen) {
                fontMenu.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                fontMenu.classList.add('opacity-100', 'pointer-events-auto', 'translate-y-0');
            } else {
                fontMenu.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                fontMenu.classList.remove('opacity-100', 'pointer-events-auto', 'translate-y-0');
            }
        });

        fontOpts.forEach(btn => {
            btn.addEventListener('click', (e) => {
                fontOpts.forEach(b => {
                    b.classList.remove('bg-[var(--bg-active)]', 'text-[var(--text-active)]');
                    b.classList.add('hover:bg-[var(--bg-panel)]', 'text-[var(--text-muted)]', 'hover:text-[var(--text-active)]');
                });
                e.target.classList.remove('hover:bg-[var(--bg-panel)]', 'text-[var(--text-muted)]', 'hover:text-[var(--text-active)]');
                e.target.classList.add('bg-[var(--bg-active)]', 'text-[var(--text-active)]');
                
                document.body.style.setProperty('--font-typing', e.target.dataset.font);
                
                setTimeout(() => {
                    const firstWord = document.getElementById('w-0');
                    if(firstWord) state.lineHeight = firstWord.offsetHeight + 8;
                    updateCaret();
                }, 100);

                fontToggleBtn.click();
                DOM.mobileInput.focus();
            });
        });

        function initTest() {
            clearInterval(state.timer);
            state = { ...state, words: generateWords(100), currentWordIdx: 0, currentLetterIdx: 0, timeLeft: state.timeLimit, timer: null, active: false, finished: false, correctKeystrokes: 0, incorrectKeystrokes: 0, totalKeystrokes: 0 };
            DOM.timer.textContent = state.timeLeft;
            DOM.timer.classList.remove('text-[var(--text-muted)]');
            DOM.timer.classList.add('text-[var(--text-normal)]');
            DOM.liveWpm.style.opacity = '0';
            DOM.typingArea.classList.remove('opacity-0', 'pointer-events-none');
            DOM.resultsArea.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
            DOM.resultsArea.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            DOM.wordsInner.style.transform = `translateY(0px)`;
            
            renderWords();
            updateCaret();
            startCaretBlink();
            DOM.mobileInput.value = '';
            DOM.mobileInput.focus();
        }

        function generateWords(count) {
            let res = [];
            for (let i = 0; i < count; i++) res.push(wordsList[Math.floor(Math.random() * wordsList.length)]);
            return res;
        }

        function renderWords() {
            DOM.wordsInner.innerHTML = state.words.map((word, wIdx) => {
                const letters = word.split('').map((letter, lIdx) => `<span id="l-${wIdx}-${lIdx}" class="transition-colors duration-150 text-[var(--text-muted)]">${letter}</span>`).join('');
                return `<div id="w-${wIdx}" class="inline-block mx-2 my-1 border-b-[2px] border-transparent transition-colors">${letters}</div>`;
            }).join('');
            
            setTimeout(() => {
                const firstWord = document.getElementById('w-0');
                if(firstWord) state.lineHeight = firstWord.offsetHeight + 8;
            }, 0);
        }

        let blinkInterval; let typingTimeout;
        function startCaretBlink() {
            clearInterval(blinkInterval);
            blinkInterval = setInterval(() => {
                if(!state.active) DOM.caret.style.opacity = DOM.caret.style.opacity === '0' ? '1' : '0';
            }, 500);
        }

        function forceCaretVisible() {
            clearInterval(blinkInterval);
            DOM.caret.style.opacity = '1';
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(startCaretBlink, 500);
        }

        function updateCaret() {
            const wordEl = document.getElementById(`w-${state.currentWordIdx}`);
            if (!wordEl) return;
            let targetEl = document.getElementById(`l-${state.currentWordIdx}-${state.currentLetterIdx}`);
            let left, top;
            if (targetEl) {
                left = targetEl.offsetLeft; top = targetEl.offsetTop;
            } else {
                const lastLetter = wordEl.lastChild;
                if(lastLetter) { left = lastLetter.offsetLeft + lastLetter.offsetWidth; top = lastLetter.offsetTop; } 
                else { left = wordEl.offsetLeft; top = wordEl.offsetTop; }
            }
            DOM.caret.style.transform = `translate(${left - 1}px, ${top + 6}px)`;
            forceCaretVisible();
            if (top > state.lineHeight * 1.5) {
                const targetY = top - state.lineHeight;
                DOM.wordsInner.style.transform = `translateY(-${targetY}px)`;
            } else if (top < state.lineHeight) DOM.wordsInner.style.transform = `translateY(0px)`;
        }

        function handleInput(e) {
            if (state.finished || ['Tab', 'Shift', 'Control', 'Alt', 'Meta', 'CapsLock', 'Escape', 'Enter'].includes(e.key)) return;
            if (!state.active && e.key.length === 1 && e.key !== ' ') startTimer();

            const wordEl = document.getElementById(`w-${state.currentWordIdx}`);
            const expectedWord = state.words[state.currentWordIdx];

            if (e.key === 'Backspace') {
                if (state.currentLetterIdx > 0) {
                    state.currentLetterIdx--;
                    const letterEl = document.getElementById(`l-${state.currentWordIdx}-${state.currentLetterIdx}`);
                    if (letterEl) letterEl.className = 'transition-colors duration-150 text-[var(--text-muted)]';
                    else wordEl.lastChild.remove();
                } else if (state.currentWordIdx > 0) {
                    state.currentWordIdx--;
                    const prevWordEl = document.getElementById(`w-${state.currentWordIdx}`);
                    state.currentLetterIdx = prevWordEl.childNodes.length;
                    prevWordEl.classList.remove('border-[var(--error-underline)]');
                }
            } else if (e.key === ' ') {
                e.preventDefault();
                if (state.currentLetterIdx > 0) {
                    const hasErrors = wordEl.querySelectorAll('.text-\\[var\\(--error\\)\\]').length > 0;
                    if (state.currentLetterIdx < expectedWord.length || hasErrors) wordEl.classList.add('border-[var(--error-underline)]');
                    state.currentWordIdx++; state.currentLetterIdx = 0;
                }
            } else if (e.key.length === 1) {
                state.totalKeystrokes++;
                if (state.currentLetterIdx < expectedWord.length) {
                    const letterEl = document.getElementById(`l-${state.currentWordIdx}-${state.currentLetterIdx}`);
                    if (e.key === expectedWord[state.currentLetterIdx]) {
                        letterEl.className = 'transition-colors duration-150 text-[var(--text-active)]';
                        state.correctKeystrokes++;
                    } else {
                        letterEl.className = 'transition-colors duration-150 text-[var(--error)]';
                        state.incorrectKeystrokes++;
                    }
                } else {
                    const extraLetter = document.createElement('span');
                    extraLetter.className = 'transition-colors duration-150 text-[var(--error)] opacity-70';
                    extraLetter.textContent = e.key;
                    wordEl.appendChild(extraLetter);
                    state.incorrectKeystrokes++;
                }
                state.currentLetterIdx++;
            }
            updateCaret(); updateLiveWpm();
        }

        function startTimer() {
            state.active = true;
            DOM.timer.classList.replace('text-[var(--text-normal)]', 'text-[var(--text-muted)]');
            DOM.liveWpm.style.opacity = '1';
            state.timer = setInterval(() => {
                state.timeLeft--;
                DOM.timer.textContent = state.timeLeft;
                updateLiveWpm();
                if (state.timeLeft <= 0) endTest();
            }, 1000);
        }

        function updateLiveWpm() {
            if(!state.active) return;
            const timeElapsed = state.timeLimit - state.timeLeft;
            if(timeElapsed > 0) {
                const wpm = Math.round((state.correctKeystrokes / 5) / (timeElapsed / 60));
                DOM.liveWpm.textContent = `${Math.max(0, wpm)} wpm`;
            }
        }

        function endTest() {
            clearInterval(state.timer);
            state.active = false; state.finished = true;
            DOM.caret.style.opacity = '0';
            const wpm = Math.round((state.correctKeystrokes / 5) / (state.timeLimit / 60));
            const accuracy = state.totalKeystrokes === 0 ? 0 : Math.round((state.correctKeystrokes / state.totalKeystrokes) * 100);

            document.getElementById('res-wpm').textContent = Math.max(0, wpm);
            document.getElementById('res-acc').textContent = `${accuracy}%`;
            document.getElementById('res-keys').textContent = `${state.correctKeystrokes}/${state.incorrectKeystrokes}`;
            document.getElementById('res-time').textContent = `${state.timeLimit}s`;

            DOM.typingArea.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                DOM.resultsArea.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                DOM.resultsArea.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
            }, 200);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') { e.preventDefault(); DOM.restartBtn.focus(); }
            if (e.key === 'Enter' && document.activeElement === DOM.restartBtn) initTest();
            else if (document.activeElement !== DOM.restartBtn) { DOM.mobileInput.focus(); handleInput(e); }
        });

        DOM.typingArea.addEventListener('click', () => DOM.mobileInput.focus());
        DOM.restartBtn.addEventListener('click', () => { initTest(); DOM.mobileInput.focus(); DOM.restartBtn.blur(); });

        DOM.timeOpts.forEach(btn => {
            btn.addEventListener('click', (e) => {
                DOM.timeOpts.forEach(b => {
                    b.classList.remove('bg-[var(--bg-active)]', 'text-[var(--text-active)]');
                    b.classList.add('hover:text-[var(--text-normal)]');
                });
                e.target.classList.remove('hover:text-[var(--text-normal)]');
                e.target.classList.add('bg-[var(--bg-active)]', 'text-[var(--text-active)]');
                state.timeLimit = parseInt(e.target.dataset.time);
                initTest();
            });
        });

        initTest();
    </script>

</body></html>
